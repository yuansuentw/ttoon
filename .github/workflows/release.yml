name: Public Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: public-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-check:
    name: Release Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify release versions
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            bash op/check_release_versions.sh "$version"
          else
            bash op/check_release_versions.sh
          fi

  rust-package:
    name: Rust Package
    needs: release-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Package crate locally
        working-directory: rust
        run: cargo package -p ttoon-core --locked --allow-dirty

      - name: Upload crate artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-crate
          path: rust/target/package/*.crate

  build-python-wheels:
    name: Build Python Wheels (${{ matrix.label }})
    needs: release-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          - label: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto
          - label: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: ""
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            manylinux: ""
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          working-directory: python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --interpreter 3.11

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.label }}
          path: python/dist

  build-python-sdist:
    name: Build Python sdist
    needs: release-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: python
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: python/dist

  package-js:
    name: JS Packages
    needs: release-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Ensure WASM package
        working-directory: js
        run: npm run ensure:wasm-bridge

      - name: Install JS dependencies
        working-directory: js
        run: npm install

      - name: Build JS packages
        working-directory: js
        run: npm run build

      - name: Pack JS packages locally
        working-directory: js
        run: |
          mkdir -p dist-packages
          npm pack -w @ttoon/shared --pack-destination dist-packages
          npm pack -w @ttoon/node --pack-destination dist-packages
          npm pack -w @ttoon/web --pack-destination dist-packages

      - name: Upload JS package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: js-packages
          path: js/dist-packages

  release-assets:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - rust-package
      - build-python-wheels
      - build-python-sdist
      - package-js
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List packaged assets
        run: find release-assets -maxdepth 1 -type f | sort

      - name: Attach packaged assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
