name: Public CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: public-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  rust-package-check:
    name: Rust Package Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: public-rust-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: public-rust-${{ runner.os }}-

      - name: Build Rust workspace
        working-directory: rust
        run: cargo build --locked --release

      - name: Package crate locally
        working-directory: rust
        run: cargo package -p ttoon-core --locked --allow-dirty

  python-package-check:
    name: Python Package Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: public-python-rust-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: public-python-rust-${{ runner.os }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: python
        run: uv sync --group dev

      - name: Build wheel locally
        working-directory: python
        run: uv run --with maturin maturin build --release --out dist --interpreter 3.11

      - name: Build sdist locally
        working-directory: python
        run: uv run --with maturin maturin sdist --out dist

  js-package-check:
    name: JS Package Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: public-js-rust-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: public-js-rust-${{ runner.os }}-

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Ensure WASM package
        working-directory: js
        run: npm run ensure:wasm-bridge

      - name: Install dependencies
        working-directory: js
        run: npm install

      - name: Build JS packages
        working-directory: js
        run: npm run build

      - name: Pack JS packages locally
        working-directory: js
        run: |
          mkdir -p dist-packages
          npm pack -w @ttoon/shared --pack-destination dist-packages
          npm pack -w @ttoon/node --pack-destination dist-packages
          npm pack -w @ttoon/web --pack-destination dist-packages
